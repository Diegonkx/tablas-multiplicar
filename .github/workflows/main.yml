name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma
          python -m pip install --upgrade pip
          pip install --user buildozer cython virtualenv

      - name: Create Buildozer Spec File
        run: |
          ~/.local/bin/buildozer init

      - name: Configure buildozer.spec
        run: |
          sed -i 's/^title =.*/title = Tablas Animadas/' buildozer.spec
          sed -i 's/^package.name =.*/package.name = tablasanimadas/' buildozer.spec
          sed -i 's/^package.domain =.*/package.domain = org.tarea/' buildozer.spec
          sed -i 's/^source.include_exts =.*/source.include_exts = py,png,jpg,ttf/' buildozer.spec
          sed -i 's/^requirements =.*/requirements = python3,pygame==2.5.2,kivy==2.3.0/' buildozer.spec
          sed -i 's/^#android.archs =.*/android.archs = arm64-v8a/' buildozer.spec

      - name: Build with Buildozer
        run: ~/.local/bin/buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: package
          path: bin/*.apk
